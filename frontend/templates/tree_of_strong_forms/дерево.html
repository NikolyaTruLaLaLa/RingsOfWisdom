<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дерево Могучих Форм</title>
    <link rel="stylesheet" href="styles.css"> <!-- Подключение внешнего CSS -->
</head>
<body>
    <!-- Шапка сайта -->
    <header class="site-header">
        <div class="logo">
            <img src="logo.png" alt="Логотип">
        </div>
        <nav class="nav-links">
            <a href="#courses">Курсы</a>
            <a href="#skills">Дерево навыков</a>
            <a href="#store">Магазин</a>
        </nav>
        <div class="profile">
            <span>Профиль</span>
            <img src="profile-icon.png" alt="Иконка профиля">
        </div>
    </header>

    <!-- Контент страницы -->
    <div class="container">
        <div class="item">
            <img src="icon_gendr_forms" alt="ГЕНдерные Формы">
            <p>ГЕНдерные<br>Формы</p>
        </div>
        <div class="item">
            <img src="reverse_x.png" alt="Замена НЕизвестного">
            <p>Замена<br>НЕизвестного</p>
        </div>
        <div class="item">
            <img src="icon3.png" alt="Много Лицые">
            <p>Много -<br>Лицые</p>
        </div>
        <div class="item">
            <img src="many_faces.png" alt="Первые и вторые блюда">
            <p>Первые<br>и<br>Вторые<br>блюда</p>
        </div>
    </div>
</body>
</html>
