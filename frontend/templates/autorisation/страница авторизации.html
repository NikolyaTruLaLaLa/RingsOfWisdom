<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rings of Wisdom - Login</title>
    <link rel="stylesheet" href="main_auth.css">
</head>
<body>
    <div class="container">
        <img src="logo.png" alt="Логотип Rings of Wisdom" class="logo">
        
        <div class="login-box">
            <form>
                <label>Авторизация игрока</label>
                <a href="#" class="create-account">Создать аккаунт</a>
                
                <input type="email" placeholder="Email" required>
                <input type="password" placeholder="Пароль" required>
                
                <div class="remember-box">
                    <input type="checkbox" id="remember-me">
                    <label for="remember-me">Запомнить меня</label>
                    <a href="#" class="forgot-password">Забыли пароль?</a>
                </div>
                
                <button type="submit">Войти</button>
            </form>
            
            <a href="#" class="liu">ЛИИ ЮФУ</a>
        </div>
    </div>
</body>
</html>
