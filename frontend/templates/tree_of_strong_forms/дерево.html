<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ромб из иконок</title>
    <link rel="stylesheet" href="styles.css"> <!-- Подключение внешнего CSS -->
</head>
<body>
    <!-- Шапка сайта -->
    <header class="site-header">
        <div class="logo">
            <img src="logo.png" alt="Логотип">
        </div>
        <nav class="nav-links">
            <a href="#skills">Дерево навыков</a>
            <a href="#courses">Курсы</a>
            <a href="#store">Магазин</a>
        </nav>
        <div class="profile">
            <span>Профиль</span>
            <img src="profile-icon.png" alt="Иконка профиля">
        </div>
    </header>

    <!-- Контент страницы -->
    <div class="container">
        <div class="item">
            <img src="icon1.png" alt="Правила игры">
            <p>ГЕНдерные<br>формы</p>
        </div>
        <div class="item">
            <img src="icon2.png" alt="Захват камней">
            <p>Замена<br>НЕизвестного</p>
        </div>
        <div class="item">
            <img src="icon3.png" alt="Базовые приемы">
            <p>Много-ЛИЦЫЕ</p>
        </div>
        <div class="item">
            <img src="icon4.png" alt="Внимательность">
            <p>Первые и вторые<br>блюда</p>
        </div>
    </div>
</body>
</html>
